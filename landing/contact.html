<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
/>
<link rel="stylesheet" href="../assets/css/landing.css">
</head>
<body>

<div data-include="../partials/header.html"></div>

<!-- HERO -->
<section class="hero"
  data-title="Contact Us"
  data-subtitle="We’d love to hear from you"
  data-btn-text="Send Message"
  data-btn-link="#contact-form">
</section>

<!-- MAP SECTION -->
<section class="page">
<div class="map-container" style="margin: 2rem 0;">
  <iframe
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3979.899198021137!2d37.00317981534583!3d-0.5295200359634713!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x182f2d5243f6d91b%3A0xe6787b6e6b4e56f1!2sKerugoya%2C%20Kenya!5e0!3m2!1sen!2sus!4v1699699452479!5m2!1sen!2sus"
    width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>
</div>
</section>

<!-- CONTACT FORM -->
<section class="contact">
  <div class="contact-container">

    <!-- LEFT -->
    <div class="contact-info">
      <h2>Get in Touch</h2>
      <p>We’re here to help your school succeed.</p>

      <div class="info-box">
        <i class="fas fa-map-marker-alt"></i>
        <span>Kerugoya, Kenya</span>
      </div>

      <div class="info-box">
        <i class="fas fa-envelope"></i>
        <span>info@schoolplatform.com</span>
      </div>

      <div class="info-box">
        <i class="fas fa-phone"></i>
        <span>+254 700 000 000</span>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="contact-form-box">
      <form id="contact-form">
        <input type="text" placeholder="Name" required>
        <input type="email" placeholder="Email" required>
        <textarea placeholder="Message" required></textarea>
        <button>Send Message</button>
      </form>
    </div>

  </div>
</section>

<div data-include="../partials/footer.html"></div>

<script src="../assets/js/landing.js"></script>
</body>
</html>
